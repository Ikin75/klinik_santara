<!doctype html>
<html lang="id" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KlinikHub - SaaS Clinic Management</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#FF6B00",
              primaryHover: "#E65A00",
              darkBg: "#121212",
              darkCard: "#1E1E1E",
            },
          },
        },
      };
    </script>
    <style>
      body {
        transition:
          background-color 0.3s,
          color 0.3s;
      }
      .fade-in {
        animation: fadeIn 0.3s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .autocomplete-item:hover {
        background-color: #f3f4f6;
      }
      .dark .autocomplete-item:hover {
        background-color: #374151;
      }
      @media print {
        body * {
          visibility: hidden;
        }
        #print-area,
        #print-area * {
          visibility: visible;
        }
        #print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          padding: 20px;
        }
        .no-print {
          display: none !important;
        }
      }

      /* Print Styles */
      @media print {
        body * {
          visibility: hidden;
        }
        #print-area,
        #print-area * {
          visibility: visible;
        }
        #print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          background: white;
          color: black;
        }
        .no-print {
          display: none !important;
        }
      }

      /* Template Dokumen Print */
      .doc-template {
        font-family: "Arial", sans-serif;
        color: #000;
        background: white;
        padding: 40px;
        max-width: 800px;
        margin: 0 auto;
      }
      .doc-header {
        text-align: center;
        border-bottom: 3px double #000;
        padding-bottom: 15px;
        margin-bottom: 20px;
      }
      .doc-header h1 {
        font-size: 24px;
        margin: 0;
        font-weight: bold;
      }
      .doc-header h2 {
        font-size: 16px;
        margin: 5px 0;
        font-weight: normal;
      }
      .doc-header p {
        font-size: 12px;
        margin: 3px 0;
      }
      .doc-body {
        font-size: 14px;
        line-height: 1.6;
      }
      .doc-body table {
        width: 100%;
        border-collapse: collapse;
        margin: 15px 0;
      }
      .doc-body table th,
      .doc-body table td {
        border: 1px solid #000;
        padding: 8px;
        text-align: left;
      }
      .doc-body table th {
        background: #f0f0f0;
        font-weight: bold;
      }
      .doc-footer {
        margin-top: 40px;
        text-align: right;
      }
      .doc-signature {
        margin-top: 60px;
        text-align: right;
      }
      .doc-signature .sign-line {
        border-top: 1px solid #000;
        width: 200px;
        display: inline-block;
        margin-top: 60px;
        padding-top: 5px;
      }
      .doc-title {
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        text-decoration: underline;
        margin: 20px 0;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      @keyframes slideOut {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(100%);
          opacity: 0;
        }
      }
      @keyframes bounceIn {
        0% {
          transform: scale(0.3);
          opacity: 0;
        }
        50% {
          transform: scale(1.05);
        }
        70% {
          transform: scale(0.9);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .animate-slide-in {
        animation: slideIn 0.3s ease-out;
      }
      .animate-slide-out {
        animation: slideOut 0.3s ease-in;
      }
      .animate-bounce-in {
        animation: bounceIn 0.4s ease-out;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 min-h-screen flex flex-col"
  >
    <!-- LOGIN VIEW -->
    <div
      id="login-view"
      class="min-h-screen flex items-center justify-center p-4"
    >
      <div
        class="bg-white dark:bg-darkCard p-8 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-800 w-full max-w-md fade-in"
      >
        <div class="text-center mb-8">
          <img
            class="clinic-logo w-12 h-12 rounded-xl object-cover mx-auto mb-4"
            src=""
            alt="Logo"
            style="display: none"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'flex';
            "
          />
          <div
            class="clinic-logo-fallback w-12 h-12 bg-primary rounded-xl items-center justify-center text-white font-bold text-2xl mx-auto mb-4"
            style="display: flex"
          >
            K
          </div>
          <h1 class="text-2xl font-bold">
            Klinik<span class="text-primary">Hub</span>
          </h1>
          <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">
            Masuk ke sistem klinik Anda
          </p>
        </div>
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">Email</label>
            <input
              type="email"
              id="login-email"
              required
              class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 focus:ring-2 focus:ring-primary outline-none transition"
              placeholder="admin@klinik.com"
            />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Password</label>
            <input
              type="password"
              id="login-password"
              required
              class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 focus:ring-2 focus:ring-primary outline-none transition"
              placeholder="••••••••"
            />
          </div>
          <button
            type="submit"
            id="login-btn"
            class="w-full bg-primary hover:bg-primaryHover text-white font-semibold py-2.5 rounded-lg transition shadow-lg shadow-orange-500/30"
          >
            <span id="login-btn-text">Masuk</span>
          </button>
          <p
            id="login-error"
            class="text-red-500 text-sm text-center hidden"
          ></p>
        </form>
        <!-- Di dalam #login-view, setelah form login -->
        <div
          id="register-section"
          class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-700 hidden"
        >
          <p class="text-center text-sm text-gray-500 mb-4">
            Belum punya akun? Daftar Gratis
          </p>
          <form id="register-form" class="space-y-3">
            <input
              type="text"
              id="reg-clinic-name"
              placeholder="Nama Klinik"
              required
              class="w-full px-4 py-2 rounded-lg border"
            />
            <input
              type="email"
              id="reg-email"
              placeholder="Email Admin"
              required
              class="w-full px-4 py-2 rounded-lg border"
            />
            <input
              type="password"
              id="reg-password"
              placeholder="Password"
              required
              class="w-full px-4 py-2 rounded-lg border"
            />
            <button
              type="submit"
              class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold"
            >
              🎉 Daftar Gratis
            </button>
          </form>
          <p class="text-xs text-gray-400 text-center mt-2">
            Fitur lengkap? <a href="#" class="text-primary">Upgrade ke PRO</a>
          </p>
        </div>

        <!-- Tombol untuk beralih ke form register -->
        <button
          id="show-register-btn"
          class="w-full text-center text-sm text-primary hover:underline mt-4"
        >
          Belum punya akun? Daftar Gratis →
        </button>
      </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="hidden flex-grow flex fade-in">
      <!-- OVERLAY (klik luar sidebar untuk tutup) -->
      <div
        id="sidebar-overlay"
        class="hidden fixed inset-0 bg-black/50 z-40 md:hidden"
        onclick="window.closeMobileSidebar()"
      ></div>

      <aside
        id="sidebar"
        class="w-64 bg-white dark:bg-darkCard border-r border-gray-200 dark:border-gray-800 hidden md:flex flex-col fixed md:relative z-50 h-full transition-transform duration-300 -translate-x-full md:translate-x-0"
      >
        <div
          class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-800"
        >
          <img
            class="clinic-logo w-8 h-8 rounded-lg object-cover mr-3"
            src=""
            alt="Logo"
            style="display: none"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'flex';
            "
          />
          <div
            class="clinic-logo-fallback w-8 h-8 bg-primary rounded-lg items-center justify-center text-white font-bold mr-3"
            style="display: flex"
          >
            K
          </div>
          <span class="clinic-name font-bold text-xl tracking-tight"
            >KlinikHub</span
          >

          <!-- Tombol close mobile -->
          <button
            class="ml-auto md:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800"
            onclick="window.closeMobileSidebar()"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>
        <div
          class="flex items-center px-6 border-b border-gray-200 dark:border-gray-800"
        >
          <!-- <img
            class="clinic-logo w-8 h-8 rounded-lg object-cover mr-3"
            src=""
            alt="Logo"
            style="display: none"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'flex';
            "
          /> -->
          <!-- <div
            class="clinic-logo-fallback w-8 h-8 bg-primary rounded-lg items-center justify-center text-white font-bold mr-3"
            style="display: flex"
          >
            K
          </div>
          <span class="clinic-name font-bold tracking-tight">KlinikHub</span> -->
        </div>
        <nav
          class="flex-grow p-4 space-y-1 overflow-y-auto no-scrollbar"
          id="sidebar-menu"
        ></nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-800">
          <button
            id="btn-logout"
            class="w-full flex items-center gap-3 px-4 py-2 text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              ></path>
            </svg>
            Keluar
          </button>
        </div>
      </aside>

      <div class="flex-grow flex flex-col min-w-0">
        <header
          class="h-16 bg-white dark:bg-darkCard border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-4 sm:px-6 sticky top-0 z-40"
        >
          <div class="flex items-center gap-4">
            <!-- 🆕 TOMBOL HAMBURGER UNTUK MOBILE -->
            <button
              id="mobile-menu-btn"
              class="md:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition"
              onclick="window.toggleMobileSidebar()"
            >
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                ></path>
              </svg>
            </button>
            <h2 id="page-title" class="text-lg font-semibold">Dashboard</h2>
          </div>
          <div class="flex items-center gap-4">
            <span
              id="user-role-badge"
              class="px-3 py-1 text-xs font-semibold bg-orange-100 text-primary dark:bg-orange-900/30 dark:text-orange-400 rounded-full capitalize"
              >Loading...</span
            >
            <button
              id="theme-toggle"
              class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition"
            >
              <svg
                id="sun-icon"
                class="w-5 h-5 hidden dark:block text-yellow-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
                ></path>
              </svg>
              <svg
                id="moon-icon"
                class="w-5 h-5 block dark:hidden text-gray-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
                ></path>
              </svg>
            </button>
          </div>
        </header>
        <main
          class="flex-grow p-4 sm:p-6 lg:p-8 overflow-y-auto"
          id="main-content"
        ></main>
      </div>
    </div>

    <!-- MODAL RIWAYAT MEDIS -->
    <div
      id="history-modal"
      class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in"
    >
      <div
        class="bg-white dark:bg-darkCard w-full max-w-4xl max-h-[90vh] rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-800 flex flex-col overflow-hidden"
      >
        <!-- Header Modal -->
        <div
          class="p-6 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-900/50"
        >
          <div>
            <h3 class="text-xl font-bold text-gray-900 dark:text-gray-100">
              Riwayat Medis Pasien
            </h3>
            <p
              id="history-patient-name"
              class="text-sm text-gray-500 dark:text-gray-400 mt-1"
            >
              Memuat data...
            </p>
          </div>
          <button
            onclick="window.closeHistoryModal()"
            class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition"
          >
            <svg
              class="w-6 h-6 text-gray-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>

        <!-- Content Modal (Scrollable) -->
        <div id="history-content" class="flex-grow overflow-y-auto p-6">
          <div class="text-center py-10">
            <svg
              class="animate-spin h-8 w-8 text-primary mx-auto"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL ODONTOGRAM (MULTI-CONDITION) -->
    <div
      id="odontogram-modal"
      class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in"
    >
      <div
        class="bg-white dark:bg-darkCard w-full max-w-2xl rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-800 flex flex-col overflow-hidden max-h-[90vh]"
      >
        <div
          class="p-6 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-900/50"
        >
          <div>
            <h3
              class="text-xl font-bold text-gray-900 dark:text-gray-100"
              id="odontogram-tooth-title"
            >
              Pilih Kondisi Gigi
            </h3>
            <p
              id="odontogram-active-conditions"
              class="text-sm text-gray-500 dark:text-gray-400 mt-1"
            >
              Klik kondisi untuk aktifkan/nonaktifkan
            </p>
          </div>
          <button
            onclick="window.closeOdontogramModal()"
            class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition"
          >
            <svg
              class="w-6 h-6 text-gray-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>

        <div class="p-6 overflow-y-auto">
          <!-- Pilihan Kondisi (Toggle) -->
          <div
            class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6"
            id="condition-buttons"
          >
            <button
              onclick="window.toggleToothCondition('healthy')"
              data-condition="healthy"
              class="condition-btn p-4 rounded-lg border-2 border-gray-200 dark:border-gray-700 hover:border-green-500 bg-white dark:bg-gray-800 flex flex-col items-center gap-2 transition"
            >
              <div
                class="w-10 h-10 rounded-full bg-white border-2 border-gray-300"
              ></div>
              <span class="text-sm font-semibold">Sehat</span>
              <span class="condition-status text-xs text-gray-400"
                >Tidak aktif</span
              >
            </button>
            <button
              onclick="window.toggleToothCondition('caries')"
              data-condition="caries"
              class="condition-btn p-4 rounded-lg border-2 border-gray-200 dark:border-gray-700 hover:border-red-500 bg-white dark:bg-gray-800 flex flex-col items-center gap-2 transition"
            >
              <div class="w-10 h-10 rounded-full bg-red-500"></div>
              <span class="text-sm font-semibold">Karies/Lubang</span>
              <span class="condition-status text-xs text-gray-400"
                >Tidak aktif</span
              >
            </button>
            <button
              onclick="window.toggleToothCondition('calculus')"
              data-condition="calculus"
              class="condition-btn p-4 rounded-lg border-2 border-gray-200 dark:border-gray-700 hover:border-yellow-500 bg-white dark:bg-gray-800 flex flex-col items-center gap-2 transition"
            >
              <div class="w-10 h-10 rounded-full bg-yellow-500"></div>
              <span class="text-sm font-semibold">Karang Gigi</span>
              <span class="condition-status text-xs text-gray-400"
                >Tidak aktif</span
              >
            </button>
            <button
              onclick="window.toggleToothCondition('filled')"
              data-condition="filled"
              class="condition-btn p-4 rounded-lg border-2 border-gray-200 dark:border-gray-700 hover:border-blue-500 bg-white dark:bg-gray-800 flex flex-col items-center gap-2 transition"
            >
              <div class="w-10 h-10 rounded-full bg-blue-500"></div>
              <span class="text-sm font-semibold">Tambalan</span>
              <span class="condition-status text-xs text-gray-400"
                >Tidak aktif</span
              >
            </button>
            <button
              onclick="window.toggleToothCondition('missing')"
              data-condition="missing"
              class="condition-btn p-4 rounded-lg border-2 border-gray-200 dark:border-gray-700 hover:border-gray-800 bg-white dark:bg-gray-800 flex flex-col items-center gap-2 transition"
            >
              <div
                class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center text-white text-sm font-bold"
              >
                X
              </div>
              <span class="text-sm font-semibold">Hilang/Cabut</span>
              <span class="condition-status text-xs text-gray-400"
                >Tidak aktif</span
              >
            </button>
            <button
              onclick="window.toggleToothCondition('pulpitis')"
              data-condition="pulpitis"
              class="condition-btn p-4 rounded-lg border-2 border-gray-200 dark:border-gray-700 hover:border-purple-500 bg-white dark:bg-gray-800 flex flex-col items-center gap-2 transition"
            >
              <div class="w-10 h-10 rounded-full bg-purple-500"></div>
              <span class="text-sm font-semibold">Pulpitis</span>
              <span class="condition-status text-xs text-gray-400"
                >Tidak aktif</span
              >
            </button>
          </div>

          <!-- Catatan Tambahan -->
          <div class="border-t border-gray-200 dark:border-gray-700 pt-4">
            <label class="block text-sm font-medium mb-2"
              >Catatan Tambahan (Opsional)</label
            >
            <textarea
              id="tooth-notes"
              rows="2"
              class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 outline-none"
              placeholder="Contoh: Gigi sensitif terhadap dingin..."
            ></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL CETAK DOKUMEN -->
    <div
      id="print-modal"
      class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in"
    >
      <div
        class="bg-white dark:bg-darkCard w-full max-w-3xl rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-800 flex flex-col overflow-hidden max-h-[90vh]"
      >
        <div
          class="p-6 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-900/50"
        >
          <h3 class="text-xl font-bold text-gray-900 dark:text-gray-100">
            ️ Cetak Dokumen
          </h3>
          <button
            onclick="window.closePrintModal()"
            class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition"
          >
            <svg
              class="w-6 h-6 text-gray-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>

        <div class="p-6 overflow-y-auto">
          <!-- Pilihan Jenis Dokumen -->
          <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
            <button
              onclick="window.selectPrintType('resep')"
              class="print-type-btn p-6 bg-blue-50 dark:bg-blue-900/20 hover:bg-blue-100 dark:hover:bg-blue-900/40 rounded-xl border-2 border-blue-200 dark:border-blue-800 transition flex flex-col items-center gap-3"
            >
              <svg
                class="w-12 h-12 text-blue-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"
                ></path>
              </svg>
              <span class="font-semibold text-blue-700 dark:text-blue-400"
                >Resep Obat</span
              >
            </button>

            <button
              onclick="window.selectPrintType('sakit')"
              class="print-type-btn p-6 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/40 rounded-xl border-2 border-red-200 dark:border-red-800 transition flex flex-col items-center gap-3"
            >
              <svg
                class="w-12 h-12 text-red-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                ></path>
              </svg>
              <span class="font-semibold text-red-700 dark:text-red-400"
                >Surat Sakit</span
              >
            </button>

            <button
              onclick="window.selectPrintType('sehat')"
              class="print-type-btn p-6 bg-green-50 dark:bg-green-900/20 hover:bg-green-100 dark:hover:bg-green-900/40 rounded-xl border-2 border-green-200 dark:border-green-800 transition flex flex-col items-center gap-3"
            >
              <svg
                class="w-12 h-12 text-green-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                ></path>
              </svg>
              <span class="font-semibold text-green-700 dark:text-green-400"
                >Surat Sehat</span
              >
            </button>

            <button
              onclick="window.selectPrintType('laik')"
              class="print-type-btn p-6 bg-purple-50 dark:bg-purple-900/20 hover:bg-purple-100 dark:hover:bg-purple-900/40 rounded-xl border-2 border-purple-200 dark:border-purple-800 transition flex flex-col items-center gap-3"
            >
              <svg
                class="w-12 h-12 text-purple-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
                ></path>
              </svg>
              <span class="font-semibold text-purple-700 dark:text-purple-400"
                >Surat Laik Kerja</span
              >
            </button>

            <button
              onclick="window.selectPrintType('invoice')"
              class="print-type-btn p-6 bg-yellow-50 dark:bg-yellow-900/20 hover:bg-yellow-100 dark:hover:bg-yellow-900/40 rounded-xl border-2 border-yellow-200 dark:border-yellow-800 transition flex flex-col items-center gap-3"
            >
              <svg
                class="w-12 h-12 text-yellow-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"
                ></path>
              </svg>
              <span class="font-semibold text-yellow-700 dark:text-yellow-400"
                >Invoice/Struk</span
              >
            </button>
          </div>

          <!-- Form Input untuk Dokumen -->
          <div
            id="print-form-container"
            class="hidden border-t border-gray-200 dark:border-gray-700 pt-6"
          >
            <h4
              class="font-semibold mb-4 text-gray-900 dark:text-gray-100"
              id="print-form-title"
            >
              Detail Dokumen
            </h4>
            <div id="print-form-fields" class="space-y-3"></div>

            <div class="flex gap-3 mt-6">
              <button
                onclick="window.previewPrintDocument()"
                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition"
              >
                👁️ Preview
              </button>
              <button
                onclick="window.doPrintDocument()"
                class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition"
              >
                ️ Cetak Sekarang
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- AREA PREVIEW/PRINT (tersembunyi, hanya untuk print) -->
    <div id="print-area" class="hidden"></div>

    <!-- NOTIFIKASI GLOBAL -->
    <div
      id="global-notif"
      class="hidden fixed top-5 right-5 z-[300] max-w-sm w-full animate-slide-in"
    >
      <div
        class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-5 border border-gray-200 dark:border-gray-700 flex items-start gap-3"
      >
        <div id="global-notif-icon" class="text-3xl flex-shrink-0"></div>
        <div class="flex-1">
          <h3 id="global-notif-title" class="font-bold text-sm mb-1"></h3>
          <p
            id="global-notif-message"
            class="text-sm text-gray-600 dark:text-gray-300"
          ></p>
        </div>
        <button
          onclick="window.closeGlobalNotif()"
          class="text-gray-400 hover:text-gray-600 flex-shrink-0"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- KONFIRMASI DIALOG -->
    <div
      id="global-confirm"
      class="hidden fixed inset-0 z-[300] flex items-center justify-center bg-black/50 backdrop-blur-sm"
    >
      <div
        class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-2xl shadow-2xl p-6 text-center animate-bounce-in"
      >
        <div id="confirm-icon" class="text-5xl mb-4"></div>
        <h3 id="confirm-title" class="text-lg font-bold mb-2"></h3>
        <p
          id="confirm-message"
          class="text-sm text-gray-600 dark:text-gray-300 mb-6"
        ></p>
        <div class="flex gap-3">
          <button
            id="confirm-cancel-btn"
            class="flex-1 px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg font-medium"
          >
            Batal
          </button>
          <button
            id="confirm-ok-btn"
            class="flex-1 px-4 py-2.5 bg-primary text-white rounded-lg font-medium"
          >
            OK
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- MAIN APP MODULE -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
